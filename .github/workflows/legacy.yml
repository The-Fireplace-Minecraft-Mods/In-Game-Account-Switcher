name: 'Build (Legacy)'
permissions: { }
on:
  workflow_dispatch:
jobs:
  legacy:
    name: 'Build (Legacy)'
    runs-on: 'ubuntu-24.04'
    timeout-minutes: 90
    permissions:
      contents: 'read'
    env:
      GRADLE_OPTS: '-Dorg.gradle.java.installations.auto-download=false'
    steps:
      - name: 'Checkout'
        timeout-minutes: 1
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7.0.0
        with:
          persist-credentials: false
      - name: 'Setup JDK (17)'
        timeout-minutes: 1
        uses: 'actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520' # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '17.0.19+10'
      - name: 'Setup JDK (21)'
        timeout-minutes: 1
        uses: 'actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520' # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '21.0.11+10'
      - name: 'Setup JDK (25)'
        timeout-minutes: 1
        uses: 'actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520' # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25.0.3+9'
      - name: 'Setup Gradle'
        timeout-minutes: 10
        uses: 'gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92' # v6.2.0
        with:
          cache-read-only: true
          dependency-graph: 'generate'
      - name: 'Build (Legacy)'
        timeout-minutes: 90
        run: './gradlew -Dru.vidtu.ias.legacy=true assemble'
      - name: 'Upload'
        timeout-minutes: 10
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        with:
          name: 'Artifacts'
          path: 'build/libs/'
